apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saravia-ingress
  namespace: saravia
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [saravia.app, api.saravia.app]
      secretName: saravia-tls
  rules:
    - host: saravia.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port: { number: 80 }
    - host: api.saravia.app
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port: { number: 80 }
          - path: /bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port: { number: 80 }
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port: { number: 80 }
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port: { number: 80 }
