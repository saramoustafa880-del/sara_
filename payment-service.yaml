apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: saravia
spec:
  replicas: 3
  selector:
    matchLabels: { app: payment-service }
  template:
    metadata:
      labels: { app: payment-service }
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/saravia/payment-service:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef: { name: saravia-secrets }
          readinessProbe:
            httpGet: { path: '/', port: 3000 }
          livenessProbe:
            httpGet: { path: '/', port: 3000 }
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: saravia
spec:
  selector: { app: payment-service }
  ports:
    - port: 80
      targetPort: 3000
